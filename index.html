<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធបង្កើតឯកសារ - @KhlomSarbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruuy+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --bg-color: #e0e5ec;
            --shadow-raised: 6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff;
            --shadow-pressed: inset 4px 4px 8px #a3b1c6, inset -4px -4px 8px #ffffff;
        }
        body { background-color: var(--bg-color); font-family: 'Kantumruuy Pro', sans-serif; padding: 20px; }
        .card { background-color: var(--bg-color); border-radius: 25px; padding: 25px; box-shadow: var(--shadow-raised); }
        .btn { padding: 15px; border-radius: 12px; border: none; background: var(--bg-color); box-shadow: var(--shadow-raised); font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:active { box-shadow: var(--shadow-pressed); }
        input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--bg-color); box-shadow: var(--shadow-pressed); outline: none; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="max-w-md mx-auto">
    <div class="card">
        <h2 class="text-center font-bold mb-4 text-xl"><i class="fas fa-file-pdf"></i> បង្កើតឯកសារ PDF</h2>
        
        <input type="text" id="doc-title" placeholder="បញ្ចូលឈ្មោះឯកសារ...">
        
        <input type="file" id="img-input" accept="image/*" multiple class="hidden" onchange="handleFiles(this.files)">
        <button class="btn w-full mb-4" onclick="document.getElementById('img-input').click()">
            <i class="fas fa-images"></i> ជ្រើសរើសរូបថត
        </button>

        <div id="img-list" class="grid grid-cols-3 gap-2 mb-4"></div>

        <button class="btn w-full bg-[#6c5ce7] text-white" onclick="sendToTelegram()">
            <i class="fas fa-paper-plane"></i> ផ្ញើចូល Telegram
        </button>
        <p class="text-center text-[10px] mt-4 text-gray-500">រក្សាសិទ្ធិដោយ @KhlomSarbot</p>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    const BOT_TOKEN = "8357461158:AAF01hj41pgjJy3J8xET3ynBxslIXZuNxUM";
    let images = [];

    function handleFiles(files) {
        for (let file of files) {
            const reader = new FileReader();
            reader.onload = (e) => {
                images.push(e.target.result);
                render();
            };
            reader.readAsDataURL(file);
        }
    }

    function render() {
        // បង្ហាញរូបភាពលើយកមក Preview លើ Viewport ធម្មតា
        document.getElementById('img-list').innerHTML = images.map(src => 
            `<img src="${src}" class="h-20 w-full object-cover rounded-lg shadow-md">`
        ).join('');
    }

    // មុខងារជំនួយសម្រាប់វាស់ទំហំរូបភាពពិតប្រាកដ (Width & Height) ដើម្បីកុំឲ្យរុញចូល PDF ទៅខូចទ្រង់ទ្រាយ
    function getImageDimensions(src) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve({ width: img.width, height: img.height });
            img.src = src;
        });
    }

    async function sendToTelegram() {
        let userId = 5010333081; 
        if (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) {
            userId = tg.initDataUnsafe.user.id;
        }

        if(images.length === 0) return Swal.fire('សូមជ្រើសរើសរូបភាពសិន!');
        
        const title = document.getElementById('doc-title').value || "Document_" + new Date().getTime();
        
        Swal.fire({ title: 'កំពុងបង្កើត PDF...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        
        const pageWidth = 210; // ទទឹងទំព័រ A4 (mm)
        const pageHeight = 297; // កម្ពស់ទំព័រ A4 (mm)
        const margin = 10; // គម្លាតពីគែម (mm)
        const maxImgWidth = pageWidth - (margin * 2);

        // ដំណើរការគូររូបភាពម្តងមួយៗចូលទៅក្នុងទំព័រ PDF ផ្ទាល់
        for (let i = 0; i < images.length; i++) {
            if (i > 0) {
                pdf.addPage(); // បង្កើតទំព័រថ្មីសម្រាប់រូបភាពបន្ទាប់ (រូបភាព១ សន្លឹក = ទំព័រA4 ១សន្លឹក)
            }

            // បន្ថែមចំណងជើងនៅទំព័រដំបូងគេបង្អស់
            if (i === 0) {
                pdf.setFont("Helvetica", "bold");
                pdf.setFontSize(20);
                pdf.text(title, pageWidth / 2, 20, { align: "center" });
            }

            try {
                const dims = await getImageDimensions(images[i]);
                // គណនាកម្ពស់រូបភាពឲ្យត្រូវសមាមាត្រ (Ratio) ជាមួយទទឹង A4 ដើម្បីកុំឲ្យរូបភាពទាញវែង ឬសំប៉ែត
                const imgHeight = (dims.height * maxImgWidth) / dims.width;
                
                // កំណត់ទីតាំងគូររូបភាព (បើទំព័រទី១ គូរទាបជាងចំណងជើងបន្តិច)
                const yPosition = (i === 0) ? 35 : margin;

                // គូររូបភាពចូលទៅក្នុង PDF ដោយផ្ទាល់
                pdf.addImage(images[i], 'JPEG', margin, yPosition, maxImgWidth, imgHeight);
                
                // បន្ថែម Footer រក្សាសិទ្ធិនៅខាងក្រោមទំព័រនីមួយៗ
                pdf.setFontSize(10);
                pdf.setTextColor(120, 120, 120);
                pdf.text("រក្សាសិទ្ធិដោយ @KhlomSarbot", pageWidth / 2, pageHeight - 10, { align: "center" });
                
            } catch (error) {
                console.error("Error adding image: ", error);
            }
        }

        const pdfBlob = pdf.output('blob');

        // ផ្លាស់ប្តូរទៅជាផ្ញើទៅកាន់ Telegram
        Swal.fire({ title: 'កំពុងផ្ញើទៅ Telegram...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const formData = new FormData();
        formData.append('chat_id', userId);
        formData.append('document', pdfBlob, title + ".pdf");
        formData.append('caption', `✨ ឯកសារ "${title}" បានផ្ញើដោយជោគជ័យ!\nរក្សាសិទ្ធិដោយ @KhlomSarbot`);

        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if(data.ok) {
                Swal.fire('ជោគជ័យ!', 'ឯកសារត្រូវបានផ្ញើជូនរហ័សទាន់ចិត្ត!', 'success');
            } else {
                Swal.fire('Error', 'ផ្ញើមិនចេញ: ' + data.description, 'error');
            }
        })
        .catch(err => {
            Swal.fire('Error', 'មានបញ្ហាប្រព័ន្ធអ៊ិនធឺណិត!', 'error');
        });
    }
</script>
</body>
</html>
